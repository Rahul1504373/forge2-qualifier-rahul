services:
  - type: web
    name: forge2-kanban-api
    env: docker
    plan: free
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: APP_KEY
        sync: false
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://forge2-kanban-api.onrender.com
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: /tmp/forge2-database.sqlite
      - key: DB_FOREIGN_KEYS
        value: true
